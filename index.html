<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Next Invest | Entrar</title>

  <!-- Fonte Inter (com fallback de sistema caso não haja internet) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <!-- CSS próprio do projeto (Tailwind já compilado + estilos customizados) -->
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="page-bg min-h-screen flex items-center justify-center p-4 md:p-8">

  <main class="w-full max-w-4xl flex flex-col md:flex-row rounded-3xl overflow-hidden shadow-2xl">

    <!-- Painel da marca -->
    <section class="brand-panel w-full md:w-1/2 text-white p-8 md:p-10 flex flex-col justify-center">
      <div class="flex items-center gap-3 mb-8">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-7 h-7" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="2" y="5" width="20" height="14" rx="2"></rect>
          <line x1="2" y1="10" x2="22" y2="10"></line>
        </svg>
        <span class="text-2xl font-bold">Next Invest</span>
      </div>

      <h1 class="text-2xl md:text-3xl font-bold leading-snug mb-4">
        Controle financeiro completo na palma da sua mão
      </h1>

      <p class="text-white/80 text-sm md:text-base leading-relaxed">
        Gerencie suas finanças com segurança, praticidade e tecnologia de ponta.
      </p>
    </section>

    <!-- Card de login -->
    <section class="login-card bg-white w-full md:w-1/2 p-8 md:p-10 flex flex-col justify-center">
      <h2 class="text-2xl font-bold text-gray-900 mb-1">Bem-vindo de volta</h2>
      <p class="text-sm text-gray-500 mb-6">Entre com suas credenciais</p>

      <form action="#" method="post">
        <!-- Campo CPF ou E-mail -->
        <label for="login" class="block text-sm font-semibold text-gray-700 mb-1">CPF ou E-mail</label>
        <div class="input-field flex items-center gap-2 border border-gray-200 rounded-xl px-4 py-3 mb-4">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4 text-gray-400 flex-shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="2" y="4" width="20" height="16" rx="2"></rect>
            <path d="m22 7-10 6L2 7"></path>
          </svg>
          <input
            id="login"
            type="text"
            placeholder="Digite seu CPF ou e-mail"
            class="w-full outline-none text-sm text-gray-700 placeholder-gray-400"
          >
        </div>

        <!-- Campo Senha -->
        <label for="senha" class="block text-sm font-semibold text-gray-700 mb-1">Senha</label>
        <div class="input-field flex items-center gap-2 border border-gray-200 rounded-xl px-4 py-3 mb-4">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4 text-gray-400 flex-shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="11" width="18" height="11" rx="2"></rect>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
          </svg>
          <input
            id="senha"
            type="password"
            placeholder="Digite sua senha"
            class="w-full outline-none text-sm text-gray-700 placeholder-gray-400"
          >
          <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4 text-gray-400 flex-shrink-0 cursor-pointer" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8Z"></path>
            <circle cx="12" cy="12" r="3"></circle>
          </svg>
        </div>

        <!-- Lembrar-me / Esqueci a senha -->
        <div class="flex items-center justify-between mb-6 text-sm">
          <label class="flex items-center gap-2 text-gray-600 cursor-pointer">
            <input type="checkbox" class="rounded border-gray-300 text-purple-600 focus:ring-purple-500">
            Lembrar-me
          </label>
          <a href="#" class="link-brand font-medium">Esqueci minha senha</a>
        </div>

        <!-- Botão Entrar -->
        <button
          type="submit"
          class="btn-gradient w-full text-white font-semibold py-3 rounded-xl mb-5"
        >
          Entrar
        </button>

        <!-- Cadastro -->
        <p class="text-center text-sm text-gray-600">
          Não tem uma conta?
          <a href="#" class="link-brand font-semibold">Cadastre-se</a>
        </p>
      </form>
    </section>

  </main>

</body>
</html>
